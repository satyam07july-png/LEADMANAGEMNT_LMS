version: "3.9"

services:

  backend:

    build: .

    container_name: iem-lms-backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - postgres

    volumes:
      - .:/app
      - /app/node_modules

  postgres:

    image: postgres:16

    container_name: iem-lms-db

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: iem_lms

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: