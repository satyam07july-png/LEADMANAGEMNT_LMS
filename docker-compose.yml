version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: iem_postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: iem_lms

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  backend:

    build: ./server

    container_name: iem_backend

    restart: always

    depends_on:

      - postgres

    ports:

      - "5000:5000"

    env_file:

      - ./server/.env

    volumes:

      - ./server:/app

      - /app/node_modules

volumes:

  postgres_data: